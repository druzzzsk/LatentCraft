experiment_name: cma_es_logp
seed: 42

model:
  checkpoint: results/smiles_vae/smiles_vae.pt
  charset: results/smiles_vae/charset.yaml
  max_len: 120
  hidden_dim: 196
  conv_depth: 4
  conv_start_filters: 16
  gru_depth: 4
  gru_dim: 488

optimizer:
  name: cma_es
  sigma0: 0.5
  n_iter: 50
  popsize: 10
  n_seeds: 100
  target_property: logP

data:
  path: data/zinc_250.csv
  max_len: 120

output:
  dir: results
  results_file: results/smiles_vae/cma_es_results.json
