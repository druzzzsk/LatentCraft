experiment_name: smiles_vae_zinc
seed: 42

model:
  max_len: 120
  hidden_dim: 196
  conv_depth: 4
  conv_start_filters: 16
  gru_depth: 4
  gru_dim: 488

training:
  epochs: 120
  batch_size: 128
  lr: 0.0004
  kl_anneal_start: 29   # paper: sigmoid centred at epoch 29
  kl_anneal_slope: 0.51 # paper: steeper slope for faster KL activation
  kl_weight: 1.0
  early_stopping_patience: 0   # 0 = disabled; train full 120 epochs like the paper
  prop_weight: 1.0             # joint property prediction loss weight
  prop_dropout: 0.15           # predictor dropout (paper: 0.15 for joint mode)

data:
  path: data/zinc_250.csv
  max_len: 120
  val_split: 0.1

output:
  dir: results/smiles_vae
  checkpoint: results/smiles_vae/smiles_vae.pt
  charset: results/smiles_vae/charset.yaml
  predictor_checkpoint: results/smiles_vae/property_predictor.pt
