experiment_name: fp_cma_es_logp
seed: 42

model:
  checkpoint: results/fp_vae/fp_vae.pt
  charset: results/fp_vae/charset.yaml
  fp_dim: 2068
  max_len: 120
  hidden_dim: 196
  gru_depth: 4
  gru_dim: 488

optimizer:
  name: cma_es
  sigma0: 0.5
  n_iter: 50
  popsize: 10
  n_seeds: 100
  target_property: logP

data:
  path: data/zinc_250.csv
  max_len: 120

output:
  dir: results/fp_vae
  results_file: results/fp_vae/cma_es_results.json
