experiment_name: fp_bayesian_opt_logp
seed: 42

model:
  checkpoint: results/fp_vae/fp_vae.pt
  charset: results/fp_vae/charset.yaml
  fp_dim: 2068
  max_len: 120
  hidden_dim: 196
  gru_depth: 4
  gru_dim: 488

optimizer:
  name: bayesian_opt
  n_init: 5
  n_iter: 20
  n_seeds: 50
  target_property: logP

data:
  path: data/zinc_250.csv
  max_len: 120

output:
  dir: results/fp_vae
  results_file: results/fp_vae/bayesian_opt_results.json
