experiment_name: gradient_ascent_logp
seed: 42

model:
  checkpoint: results/smiles_vae/smiles_vae.pt
  charset: results/smiles_vae/charset.yaml
  max_len: 120
  hidden_dim: 196
  conv_depth: 4
  conv_start_filters: 16
  gru_depth: 4
  gru_dim: 488

predictor:
  checkpoint: results/smiles_vae/property_predictor.pt
  hidden_dim: 196

optimizer:
  name: gradient_ascent
  steps: 80
  lr: 0.01
  z_penalty: 0.1
  n_seeds: 100
  target_property: logP   

data:
  path: data/zinc_250.csv
  max_len: 120

output:
  dir: results
  results_file: results/smiles_vae/gradient_ascent_results.json
