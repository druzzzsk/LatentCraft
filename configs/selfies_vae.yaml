experiment_name: selfies_vae_zinc
seed: 42

model:
  max_len: 100
  hidden_dim: 196
  conv_depth: 4
  conv_start_filters: 16
  gru_depth: 4
  gru_dim: 488

training:
  epochs: 120
  batch_size: 128
  lr: 0.0004
  kl_anneal_start: 29
  kl_anneal_slope: 0.51
  kl_weight: 1.0
  early_stopping_patience: 0
  prop_weight: 1.0
  prop_dropout: 0.15

data:
  path: data/zinc_250.csv
  max_len: 100
  val_split: 0.1

output:
  dir: results/selfies_vae
  checkpoint: results/selfies_vae/selfies_vae.pt
  charset: results/selfies_vae/charset.yaml
  predictor_checkpoint: results/selfies_vae/property_predictor.pt
