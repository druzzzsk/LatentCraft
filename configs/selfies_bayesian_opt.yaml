experiment_name: selfies_bayesian_opt_logp
seed: 42

model:
  checkpoint: results/selfies_vae/selfies_vae.pt
  charset: results/selfies_vae/charset.yaml
  max_len: 100
  hidden_dim: 196
  conv_depth: 4
  conv_start_filters: 16
  gru_depth: 4
  gru_dim: 488

optimizer:
  name: bayesian_opt
  n_init: 5
  n_iter: 20
  n_seeds: 50
  target_property: logP

data:
  path: data/zinc_250.csv
  max_len: 100

output:
  dir: results/selfies_vae
  results_file: results/selfies_vae/bayesian_opt_results.json
